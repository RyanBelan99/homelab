apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          image: docker.io/pihole/pihole:latest
          envFrom:
            - secretRef:
                name: pihole-secrets
          env:
            - name: TZ
              value: America/Los_Angeles
            # Answer queries arriving on any interface (traffic comes in via the ServiceLB pod)
            - name: FTLCONF_dns_listeningMode
              value: all
            # Upstream is the in-pod unbound DoT forwarder (see the unbound sidecar
            # below). Pi-hole forwards here in plaintext over localhost; unbound
            # re-sends encrypted (TLS) to Cloudflare + Quad9. Do not set upstreams
            # in the web UI — this env var wins on every restart.
            - name: FTLCONF_dns_upstreams
              value: 127.0.0.1#5053
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: pihole-etc
              mountPath: /etc/pihole
          readinessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 768Mi
        # DoT sidecar: forwards Pi-hole's upstream queries encrypted over TLS.
        # Shares the pod network, so Pi-hole reaches it at 127.0.0.1#5053.
        - name: unbound
          image: klutchell/unbound:latest
          command: ["unbound", "-d", "-c", "/etc/unbound/unbound.conf"]
          volumeMounts:
            - name: unbound-conf
              mountPath: /etc/unbound/unbound.conf
              subPath: unbound.conf
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
      volumes:
        - name: pihole-etc
          persistentVolumeClaim:
            claimName: pihole-etc
        - name: unbound-conf
          configMap:
            name: unbound-dot
