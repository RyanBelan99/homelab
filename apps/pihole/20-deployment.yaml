apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          image: docker.io/pihole/pihole:latest
          envFrom:
            - secretRef:
                name: pihole-secrets
          env:
            - name: TZ
              value: America/Los_Angeles
            # Answer queries arriving on any interface (traffic comes in via the ServiceLB pod)
            - name: FTLCONF_dns_listeningMode
              value: all
            # Initial upstreams; the Teleporter restore will overwrite with your real settings
            - name: FTLCONF_dns_upstreams
              value: 1.1.1.1;9.9.9.9
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: pihole-etc
              mountPath: /etc/pihole
          readinessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 768Mi
      volumes:
        - name: pihole-etc
          persistentVolumeClaim:
            claimName: pihole-etc
